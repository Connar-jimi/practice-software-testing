[pytest]
# 大厂标配：默认参数（以后直接敲 python -m pytest 就自动带这些）
addopts = -v -s --tb=short --alluredir=allure-results

# 练习阶段宽松一点（xfail 失败不会让 CI 红灯）
xfail_strict = false

# 可选：注册自定义标记（以后加 @pytest.mark.smoke 就不会报警告）
markers =
    smoke: 冒烟测试
    slow: 慢测试（夜间全量跑）
    api: API 接口测试
    shopping_flow: 完整购物流程测试
    product_crud: 商品管理链路测试

# 可选：指定测试文件夹（防止 pytest 乱找）
testpaths = tests

