name: 接口自动化测试 + Allure报告

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装 Python 依赖
      run: |
        pip install -r requirements.txt
        pip install pytest allure-pytest requests certifi pymysql

    - name: 启动 Docker（Laravel + MariaDB）
      run: docker compose up -d

    - name: 等待数据库就绪
      run: |
        until docker compose exec -T mariadb mysqladmin ping -h"127.0.0.1" --silent; do
          echo "waiting for mariadb..."
          sleep 3
        done

    # ✅ 关键修复：创建 vendor + 修权限
    - name: 初始化 Laravel 目录权限
      run: |
        docker compose exec -T -u root laravel-api mkdir -p /var/www/vendor
        docker compose exec -T -u root laravel-api chmod -R 777 /var/www

    # ✅ 关键修复：用 root 执行 composer
    - name: 安装 Laravel 依赖
      run: |
        docker compose exec -T -u root laravel-api composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

    - name: 执行数据库迁移（重建表 + 初始化数据）
      run: |
        docker compose exec -T laravel-api php artisan migrate:fresh --force
        docker compose exec -T laravel-api php artisan db:seed --force

    - name: 确认关键表存在（调试用，可后续删除）
      run: |
        docker compose exec -T mariadb mysql -uroot -proot toolshop -e "SHOW TABLES;"

    - name: 运行接口自动化测试
      run: |
        python -m pytest tests/ -v --alluredir=allure-results

    - name: 生成 Allure 测试报告
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report

    - name: 上传 Allure 报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report