name: 接口自动化测试 + Allure报告

on:
  push:
    branches: [ main ]
  schedule:
    # 每天北京时间早上9点自动运行（UTC时间 01:00）
    - cron: '0 1 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        pip install pytest allure-pytest requests certifi pymysql

    - name: 启动 Docker（MariaDB 数据库）
      run: docker-compose up -d

    - name: 等待数据库启动
      run: sleep 15

    - name: 运行所有接口自动化测试
      run: |
        python -m pytest tests/ -v --alluredir=allure-results

    - name: 生成 Allure 测试报告
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report
        allure_config: config/allure.yml

    - name: 上传 Allure 报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report