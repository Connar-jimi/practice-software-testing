name: 接口自动化测试 + Allure报告

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'        # 每天北京时间 9:00 自动运行
  workflow_dispatch:           # 允许手动触发（最重要！）

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装 Python 依赖
      run: |
        pip install -r requirements.txt
        pip install pytest allure-pytest requests certifi pymysql

    - name: 启动 Docker 服务（MariaDB + Laravel）
      run: docker compose up -d

    - name: 等待数据库启动
      run: sleep 40

    - name: 修复 l5-swagger 版本冲突
      run: |
        docker compose exec -T laravel-api composer update darkaonline/l5-swagger --no-interaction --prefer-dist --with-all-dependencies

    - name: 安装 Laravel 依赖
      run: |
        docker compose exec -T laravel-api composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

    - name: 执行数据库迁移（清空重建）
      run: |
        docker compose exec -T laravel-api php artisan migrate:fresh --force
        docker compose exec -T laravel-api php artisan db:seed --force

    - name: 运行接口自动化测试
      run: |
        python -m pytest tests/ -v --alluredir=allure-results

    - name: 生成 Allure 测试报告
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report

    - name: 上传 Allure 报告
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report